name: CI

on:
  pull_request:
  push:
    branches: [master]

jobs:
  test:
    name: Test and build
    runs-on: ubuntu-latest
    env:
      GITHUB_TOKEN: ${{ github.token }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Clojure CLI
        uses: DeLaGuardo/setup-clojure@13.4
        with:
          cli: latest

      - name: Set up mise tools
        uses: jdx/mise-action@v2
        with:
          install: true
          cache: true

      - name: Check formatting
        run: bb clj-fmt:check

      - name: Lint Clojure code
        run: bb clj-kondo:lint

      - name: Check generated API docs
        run: |
          bb api-docs --check
          clojure -M:quickdoc:quickdoc-test:kaocha -e "(require '[scry.api-docs-test :as t] '[clojure.test :as ct]) (let [result (ct/run-tests 'scry.api-docs-test)] (when-not (ct/successful? result) (System/exit 1)))"

      - name: Run focused core tests
        run: |
          clojure -M:test -e "(require '[scry.core :as scry]) (let [result (scry/run {:namespaces ['scry.capture-test 'scry.clojure-test-test 'scry.cli-test]})] (println (scry/report-string result)) (when-not (:pass? result) (System/exit 1)))"

      - name: Run optional Kaocha slice
        run: |
          clojure -M:test:kaocha -e "(require '[scry.kaocha-test :as t] '[clojure.test :as ct]) (let [result (ct/run-tests 'scry.kaocha-test)] (when-not (ct/successful? result) (System/exit 1)))"
          clojure -M:test:kaocha -e "(require '[scry.cli-kaocha-test :as t] '[clojure.test :as ct]) (let [result (ct/run-tests 'scry.cli-kaocha-test)] (when-not (ct/successful? result) (System/exit 1)))"

      - name: Run focused build checks
        run: |
          clojure -M:test:build -e "(require '[scry.build-test :as t] '[clojure.test :as ct]) (let [result (ct/run-tests 'scry.build-test)] (when-not (ct/successful? result) (System/exit 1)))"

      - name: Build jar
        run: clojure -T:build jar
