name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      ref:
        description: Branch, tag, or SHA to check out for a non-publishing dry run
        required: false
        default: ''
      sha:
        description: Exact commit SHA expected after checkout; supplied by bb release --dry-run
        required: false
        default: ''
      expected_version:
        description: Expected 0.1.<git-count> build version for dry-run validation
        required: false
        default: ''

permissions:
  contents: write

jobs:
  release:
    name: Verify and release
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.ref || github.ref }}

      - name: Verify dry-run checkout SHA
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.sha != '' }}
        run: |
          actual_sha="$(git rev-parse HEAD)"
          if [ "$actual_sha" != "${{ inputs.sha }}" ]; then
            echo "Checked out $actual_sha, expected ${{ inputs.sha }}" >&2
            exit 1
          fi

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Clojure CLI
        uses: DeLaGuardo/setup-clojure@13.4
        with:
          cli: latest

      - name: Run core tests
        run: |
          clojure -M:test -e "(require '[scry.core :as scry]) (let [result (scry/run)] (println (scry/report-string result)) (when-not (:pass? result) (System/exit 1)))"

      - name: Run Kaocha adapter tests
        run: |
          clojure -M:test:kaocha -e "(require '[scry.kaocha-test :as t] '[clojure.test :as ct]) (let [result (ct/run-tests 'scry.kaocha-test)] (when-not (ct/successful? result) (System/exit 1)))"

      - name: Run focused build checks
        run: |
          clojure -M:test:build -e "(require '[scry.build-test :as t] '[clojure.test :as ct]) (let [result (ct/run-tests 'scry.build-test)] (when-not (ct/successful? result) (System/exit 1)))"

      - name: Run focused release checks
        run: |
          clojure -M:test:release-test -e "(require '[scry.release-test :as t] '[clojure.test :as ct]) (let [result (ct/run-tests 'scry.release-test)] (when-not (ct/successful? result) (System/exit 1)))"

      - name: Build jars
        run: clojure -T:build jars

      - name: Resolve built versions
        id: artifact
        run: |
          mapfile -t core_jars < <(find target -maxdepth 1 -type f -name 'scry-[0-9]*.[0-9]*.[0-9]*.jar' ! -name 'scry-kaocha-*.jar' | sort)
          mapfile -t kaocha_jars < <(find target -maxdepth 1 -type f -name 'scry-kaocha-[0-9]*.[0-9]*.[0-9]*.jar' | sort)

          if [ "${#core_jars[@]}" -ne 1 ]; then
            echo "Expected exactly one core jar matching target/scry-[0-9]*.[0-9]*.[0-9]*.jar, found ${#core_jars[@]}" >&2
            printf '%s\n' "${core_jars[@]}" >&2
            exit 1
          fi

          if [ "${#kaocha_jars[@]}" -ne 1 ]; then
            echo "Expected exactly one Kaocha adapter jar matching target/scry-kaocha-[0-9]*.[0-9]*.[0-9]*.jar, found ${#kaocha_jars[@]}" >&2
            printf '%s\n' "${kaocha_jars[@]}" >&2
            exit 1
          fi

          core_jar_file="${core_jars[0]}"
          kaocha_jar_file="${kaocha_jars[0]}"
          core_version="${core_jar_file#target/scry-}"
          core_version="${core_version%.jar}"
          kaocha_version="${kaocha_jar_file#target/scry-kaocha-}"
          kaocha_version="${kaocha_version%.jar}"

          if [ "$core_version" != "$kaocha_version" ]; then
            echo "Core jar version $core_version did not match Kaocha adapter jar version $kaocha_version" >&2
            exit 1
          fi

          echo "core_jar_file=$core_jar_file" >> "$GITHUB_OUTPUT"
          echo "kaocha_jar_file=$kaocha_jar_file" >> "$GITHUB_OUTPUT"
          echo "version=$core_version" >> "$GITHUB_OUTPUT"
          echo "Built $core_jar_file and $kaocha_jar_file for version $core_version"

      - name: Verify dry-run expected version
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.expected_version != '' }}
        run: |
          if [ "${{ steps.artifact.outputs.version }}" != "${{ inputs.expected_version }}" ]; then
            echo "Built version ${{ steps.artifact.outputs.version }} did not match expected ${{ inputs.expected_version }}" >&2
            exit 1
          fi

      - name: Validate dry-run changelog shape
        if: ${{ github.event_name == 'workflow_dispatch' }}
        run: |
          clojure -M:release-test -e '
          (require (quote [clojure.java.shell :as shell])
                   (quote [clojure.string :as str])
                   (quote [scry.release :as r]))
          (let [version "${{ inputs.expected_version }}"
                release-tag (when (not (str/blank? version)) (str "v" version))
                head-sha (str/trim (:out (shell/sh "git" "rev-parse" "HEAD")))
                tag-result (when release-tag
                             (shell/sh "git" "rev-parse" "--verify" "--quiet"
                                       (str "refs/tags/" release-tag "^{commit}")))
                tag-sha (when (and tag-result (zero? (:exit tag-result)))
                          (str/trim (:out tag-result)))]
            (r/dry-run-changelog-section (slurp "CHANGELOG.md")
                                         {:version version
                                          :input-ref "${{ inputs.ref }}"
                                          :head-sha head-sha
                                          :tag-sha tag-sha}))'

      - name: Validate publishing tag and version
        if: ${{ github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v') }}
        run: |
          clojure -M:release-test -e '
          (require (quote [scry.release :as r]))
          (r/assert-tag-matches-version! "${{ github.ref_name }}" "${{ steps.artifact.outputs.version }}")'

      - name: Extract release notes
        if: ${{ github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v') }}
        run: |
          clojure -M:release-test -e '
          (require (quote [scry.release :as r]))
          (let [version "${{ steps.artifact.outputs.version }}"]
            (spit "release-notes.md" (str (r/release-section (slurp "CHANGELOG.md") version) "\n")))'

      - name: Deploy to Clojars
        if: ${{ github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v') }}
        env:
          CLOJARS_USERNAME: ${{ secrets.CLOJARS_USERNAME }}
          CLOJARS_PASSWORD: ${{ secrets.CLOJARS_PASSWORD }}
        run: clojure -T:build:deploy deploy-all

      - name: Create GitHub Release
        if: ${{ github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v') }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" \
            "${{ steps.artifact.outputs.core_jar_file }}" \
            "${{ steps.artifact.outputs.kaocha_jar_file }}" \
            --title "${{ github.ref_name }}" \
            --notes-file release-notes.md
